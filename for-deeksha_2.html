<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for babe</title>
<style>
  :root{
    --cream:#fff3ec;
    --blush:#f7d9d2;
    --rose:#d97a86;
    --deep:#7a2b3a;
    --maroon:#4a1c2b;
    --gold:#c9a166;
    --leaf:#7a8b69;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at 50% 0%, var(--blush), var(--cream) 70%);
    font-family:'Cormorant Garamond', Georgia, serif;
    color:var(--maroon);
    overflow-x:hidden;
  }
  @font-face{
    font-family:'Caveat';
    src:local('Caveat');
  }
  .stage{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    text-align:center;
  }

  /* ---------- Intro / envelope ---------- */
  #intro{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    cursor:pointer;
    transition:opacity 0.6s ease;
  }
  #intro.hide{ opacity:0; pointer-events:none; }

  .envelope-wrap{
    width:180px;
    height:120px;
    position:relative;
  }
  .envelope-body{
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,var(--rose),var(--deep));
    border-radius:6px;
    box-shadow:0 18px 35px -10px rgba(122,43,58,0.45);
  }
  .envelope-flap{
    position:absolute;
    top:0; left:0; width:100%; height:62px;
    background:var(--rose);
    clip-path:polygon(0 0, 50% 75%, 100% 0);
    transform-origin:top center;
    transition:transform 0.7s cubic-bezier(.6,-0.2,.3,1.4);
    border-radius:6px 6px 0 0;
  }
  .envelope-wrap:hover .envelope-flap{ transform:rotateX(-12deg); }
  .heart-seal{
    position:absolute;
    top:34px; left:50%;
    transform:translateX(-50%);
    width:26px; height:26px;
    z-index:2;
  }
  .tap-label{
    font-family:'Caveat', cursive;
    font-size:1.6rem;
    color:var(--deep);
    letter-spacing:0.5px;
  }
  .tap-sub{
    font-size:0.85rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--rose);
  }

  /* ---------- Bouquet scene ---------- */
  #bouquet-scene{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }
  #bouquet-scene.show{ display:flex; }

  .bouquet-wrap{
    position:relative;
    width:min(78vw,380px);
  }
  .petals-fall{
    position:absolute;
    inset:0;
    overflow:visible;
    pointer-events:none;
  }
  .petal-fall{
    position:absolute;
    top:-10px;
    width:10px;
    height:10px;
    border-radius:60% 0 60% 0;
    opacity:0;
    pointer-events:none;
    animation:fall linear forwards;
  }

  .bouquet-svg{
    width:min(78vw,380px);
    height:auto;
    overflow:visible;
  }

  .stem{
    stroke:var(--leaf);
    stroke-width:4;
    fill:none;
    stroke-linecap:round;
    stroke-dasharray:160;
    stroke-dashoffset:160;
    animation:grow 0.9s ease forwards;
  }
  .leaf{
    fill:var(--leaf);
    opacity:0;
    transform-origin:center;
    animation:leafIn 0.6s ease forwards;
  }
  .rose{
    transform-origin:center;
    transform-box:fill-box;
    opacity:0;
    transform:scale(0.15) rotate(-25deg);
    animation:roseBloom 0.9s cubic-bezier(.3,1.6,.5,1) forwards;
  }
  .rose-layer{
    transform-origin:center;
    transform-box:fill-box;
  }
  .ribbon{
    opacity:0;
    animation:fadeIn 0.8s ease forwards;
  }
  .sway{
    animation:sway 4.5s ease-in-out infinite;
    transform-origin:50% 100%;
  }
  .petal-fall{
    position:absolute;
    opacity:0;
    pointer-events:none;
    animation:fall linear forwards;
  }

  @keyframes grow{ to{ stroke-dashoffset:0; } }
  @keyframes roseBloom{ to{ opacity:1; transform:scale(1) rotate(0deg); } }
  @keyframes leafIn{ to{ opacity:1; transform:scale(1) rotate(var(--rot,0deg)); } }
  @keyframes fadeIn{ to{ opacity:1; } }
  @keyframes sway{
    0%,100%{ transform:rotate(-1.2deg); }
    50%{ transform:rotate(1.2deg); }
  }
  @keyframes fall{
    0%{ opacity:0; transform:translateY(-10px) rotate(0deg); }
    10%{ opacity:0.9; }
    100%{ opacity:0; transform:translateY(340px) rotate(220deg); }
  }

  /* ---------- tappable rose sparkle ---------- */
  .rose{ cursor:pointer; }
  .rose use{
    transform-box:fill-box;
    transform-origin:center;
  }
  .rose use.tap-pulse{
    animation:tapPulse 0.55s ease;
  }
  @keyframes tapPulse{
    0%{ transform:scale(1); filter:brightness(1); }
    35%{ transform:scale(1.18); filter:brightness(1.3); }
    100%{ transform:scale(1); filter:brightness(1); }
  }
  .spark{
    opacity:0;
    fill:#ffe9a8;
    transform-box:fill-box;
    transform-origin:center;
  }
  .spark.show{
    animation:sparkPop 0.7s ease forwards;
  }
  @keyframes sparkPop{
    0%{ opacity:0; transform:scale(0) translate(0,0); }
    35%{ opacity:1; }
    100%{ opacity:0; transform:scale(1) translate(var(--tx,10px),var(--ty,-10px)); }
  }

  .caption{
    font-family:'Caveat', cursive;
    font-size:1.7rem;
    color:var(--deep);
    opacity:0;
    animation:fadeIn 0.8s ease forwards;
    animation-delay:2.1s;
  }

  .continue-btn{
    margin-top:6px;
    border:1px solid var(--rose);
    background:transparent;
    color:var(--deep);
    padding:10px 26px;
    border-radius:999px;
    font-family:'Cormorant Garamond',serif;
    font-size:1rem;
    letter-spacing:0.05em;
    cursor:pointer;
    opacity:0;
    animation:fadeIn 0.8s ease forwards;
    animation-delay:2.5s;
    transition:background 0.3s, color 0.3s;
  }
  .continue-btn:hover{ background:var(--rose); color:#fff; }

  /* ---------- Note scene ---------- */
  #note-scene{
    display:none;
    max-width:560px;
    width:100%;
  }
  #note-scene.show{ display:block; }

  .paper{
    background:#fffaf6;
    border-radius:4px;
    padding:46px 38px;
    box-shadow:0 25px 60px -20px rgba(74,28,43,0.35);
    position:relative;
    transform:translateY(24px);
    opacity:0;
    animation:riseIn 0.7s ease forwards;
  }
  @keyframes riseIn{ to{ transform:translateY(0); opacity:1; } }

  .paper::before{
    content:"";
    position:absolute;
    top:14px; left:14px; right:14px; bottom:14px;
    border:1px solid var(--blush);
    border-radius:2px;
    pointer-events:none;
  }
  .salutation{
    font-family:'Caveat', cursive;
    font-size:2.2rem;
    color:var(--deep);
    margin:0 0 18px 0;
  }
  .note-line{
    font-size:1.18rem;
    line-height:1.85;
    margin:0 0 14px 0;
    text-align:left;
    min-height:1.85em;
  }
  .note-line.typing::after{
    content:'';
    display:inline-block;
    width:2px;
    height:1.1em;
    background:var(--rose);
    margin-left:2px;
    vertical-align:text-bottom;
    animation:blink 0.8s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  @keyframes lineIn{ to{ opacity:1; transform:translateY(0); } }

  .signoff{
    margin-top:22px;
    font-family:'Caveat', cursive;
    font-size:1.7rem;
    color:var(--rose);
    text-align:right;
    transition:opacity 0.8s ease;
  }

  footer{
    margin-top:26px;
    font-size:0.8rem;
    color:var(--rose);
    letter-spacing:0.08em;
    opacity:0;
    animation:fadeIn 1s ease forwards;
  }

  .note-continue{
    margin-top:18px;
    opacity:0;
    animation:fadeIn 0.8s ease forwards;
  }

  /* ---------- Music toggle ---------- */
  #music-toggle{
    position:fixed;
    top:18px; right:18px;
    width:46px; height:46px;
    border-radius:50%;
    border:1px solid var(--blush);
    background:#fffaf6;
    box-shadow:0 8px 20px -8px rgba(122,43,58,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:50;
    opacity:0;
    transition:opacity 0.5s ease, transform 0.2s ease;
  }
  #music-toggle.visible{ opacity:1; }
  #music-toggle:hover{ transform:scale(1.08); }
  #music-toggle svg{ width:20px; height:20px; }
  #music-toggle .bar{
    fill:var(--rose);
    transition:height 0.2s ease;
  }
  #music-toggle.playing .bar{ animation:eq 0.9s ease-in-out infinite; }
  #music-toggle .bar:nth-child(2){ animation-delay:0.15s; }
  #music-toggle .bar:nth-child(3){ animation-delay:0.3s; }
  @keyframes eq{
    0%,100%{ transform:scaleY(0.4); }
    50%{ transform:scaleY(1); }
  }

  /* ---------- Final scene ---------- */
  #final-scene{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:22px;
    position:relative;
  }
  #final-scene.show{ display:flex; }

  .final-heart{
    width:74px;
    height:auto;
    animation:pulse 1.6s ease-in-out infinite;
    filter:drop-shadow(0 10px 18px rgba(122,43,58,0.3));
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.12); }
  }
  .final-title{
    font-family:'Caveat', cursive;
    font-size:2.4rem;
    color:var(--deep);
    margin:0;
  }
  .final-sub{
    font-size:1.05rem;
    color:var(--maroon);
    max-width:380px;
    line-height:1.7;
    margin:0;
  }
  .replay-btn{
    margin-top:6px;
    border:1px solid var(--rose);
    background:transparent;
    color:var(--deep);
    padding:10px 24px;
    border-radius:999px;
    font-family:'Cormorant Garamond',serif;
    font-size:0.95rem;
    cursor:pointer;
    transition:background 0.3s, color 0.3s;
  }
  .replay-btn:hover{ background:var(--rose); color:#fff; }

  .floating-hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:5;
  }
  .heart-float{
    position:absolute;
    bottom:-30px;
    opacity:0;
    animation:floatUp linear forwards;
  }
  @keyframes floatUp{
    0%{ opacity:0; transform:translateY(0) translateX(0) scale(0.8) rotate(0deg); }
    10%{ opacity:0.85; }
    90%{ opacity:0.7; }
    100%{ opacity:0; transform:translateY(-100vh) translateX(var(--drift,20px)) scale(1.1) rotate(20deg); }
  }

  @media (max-width:480px){
    .paper{ padding:32px 22px; }
    .note-line{ font-size:1.05rem; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01s !important; transition-duration:0.01s !important; }
  }
</style>
</head>
<body>

<div class="stage">

  <div id="intro">
    <div class="envelope-wrap">
      <div class="envelope-body"></div>
      <div class="envelope-flap"></div>
      <svg class="heart-seal" viewBox="0 0 32 29">
        <path d="M16 27S2 18 2 9.5C2 4.8 5.6 2 9.3 2 12 2 14.3 3.6 16 6 17.7 3.6 20 2 22.7 2 26.4 2 30 4.8 30 9.5 30 18 16 27 16 27Z" fill="#c9a166"/>
      </svg>
    </div>
    <div class="tap-label">tap to open, babe</div>
    <div class="tap-sub">there's something for you</div>
  </div>

  <div id="bouquet-scene">
    <div class="bouquet-wrap">
    <svg class="bouquet-svg" viewBox="0 0 340 360">
      <defs>
        <radialGradient id="gWine" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#e8909e"/>
          <stop offset="55%" stop-color="#c44a5d"/>
          <stop offset="100%" stop-color="#8e2b3c"/>
        </radialGradient>
        <radialGradient id="gRose" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#f3b9c2"/>
          <stop offset="55%" stop-color="#d9707e"/>
          <stop offset="100%" stop-color="#a83a4c"/>
        </radialGradient>
        <radialGradient id="gBlush" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#ffd9d6"/>
          <stop offset="55%" stop-color="#eeacb2"/>
          <stop offset="100%" stop-color="#c47a86"/>
        </radialGradient>
        <symbol id="roseFlower" viewBox="-30 -30 60 60">
          <g>
            <path class="rose-layer" d="M0,2 C-9,-1 -10,-12 0,-16 C10,-12 9,-1 0,2Z" transform="rotate(0)"/>
            <path class="rose-layer" d="M0,2 C-9,-1 -10,-12 0,-16 C10,-12 9,-1 0,2Z" transform="rotate(72)"/>
            <path class="rose-layer" d="M0,2 C-9,-1 -10,-12 0,-16 C10,-12 9,-1 0,2Z" transform="rotate(144)"/>
            <path class="rose-layer" d="M0,2 C-9,-1 -10,-12 0,-16 C10,-12 9,-1 0,2Z" transform="rotate(216)"/>
            <path class="rose-layer" d="M0,2 C-9,-1 -10,-12 0,-16 C10,-12 9,-1 0,2Z" transform="rotate(288)"/>
          </g>
          <g opacity="0.95">
            <path class="rose-layer" d="M0,1 C-6,-1 -7,-9 0,-12 C7,-9 6,-1 0,1Z" transform="rotate(35) scale(0.85)"/>
            <path class="rose-layer" d="M0,1 C-6,-1 -7,-9 0,-12 C7,-9 6,-1 0,1Z" transform="rotate(107) scale(0.85)"/>
            <path class="rose-layer" d="M0,1 C-6,-1 -7,-9 0,-12 C7,-9 6,-1 0,1Z" transform="rotate(179) scale(0.85)"/>
            <path class="rose-layer" d="M0,1 C-6,-1 -7,-9 0,-12 C7,-9 6,-1 0,1Z" transform="rotate(251) scale(0.85)"/>
            <path class="rose-layer" d="M0,1 C-6,-1 -7,-9 0,-12 C7,-9 6,-1 0,1Z" transform="rotate(323) scale(0.85)"/>
          </g>
          <path d="M0,-1 C-3,-2 -3,-6 0,-7 C3,-6 3,-2 0,-1Z" opacity="0.9"/>
          <path d="M-3,4 C-8,2 -9,-4 -3,-7" fill="none" stroke="#7a2032" stroke-width="0.6" opacity="0.35"/>
          <ellipse cx="-4" cy="-7" rx="3.5" ry="2.2" fill="#fff" opacity="0.25" transform="rotate(-20)"/>
        </symbol>
        <symbol id="leafSpray" viewBox="-20 -20 40 40">
          <path d="M0,18 C-2,8 -2,0 0,-18" stroke="#5f7350" stroke-width="1.4" fill="none"/>
          <path d="M0,-18 C-7,-13 -10,-7 -8,-1 C-2,-4 2,-10 0,-18Z" fill="var(--leaf)"/>
          <path d="M0,-2 C-9,2 -13,8 -12,15 C-5,12 1,5 0,-2Z" fill="var(--leaf)"/>
          <path d="M0,-2 C9,2 13,8 12,15 C5,12 -1,5 0,-2Z" fill="#6d8159"/>
        </symbol>
        <symbol id="filler" viewBox="-16 -16 32 32">
          <path d="M0,14 L0,-14 M0,-6 L-9,-13 M0,-6 L9,-13 M0,2 L-8,-3 M0,2 L8,-3" stroke="#a9b78f" stroke-width="1" fill="none"/>
          <circle cx="0" cy="-14" r="2.6" fill="#fff7f2"/>
          <circle cx="-9" cy="-13" r="2" fill="#fff7f2"/>
          <circle cx="9" cy="-13" r="2" fill="#fff7f2"/>
          <circle cx="-8" cy="-3" r="1.8" fill="#fff7f2"/>
          <circle cx="8" cy="-3" r="1.8" fill="#fff7f2"/>
        </symbol>
        <filter id="softShadow" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#6b2233" flood-opacity="0.28"/>
        </filter>
      </defs>

      <g filter="url(#softShadow)">

      <!-- stems -->
      <path class="stem" d="M170 350 C166 280 168 220 168 175" style="animation-delay:0s"/>
      <path class="stem" d="M170 350 C148 290 120 240 100 195" style="animation-delay:0.1s"/>
      <path class="stem" d="M170 350 C190 290 218 240 238 195" style="animation-delay:0.1s"/>
      <path class="stem" d="M170 350 C158 295 140 255 122 220" style="animation-delay:0.2s"/>
      <path class="stem" d="M170 350 C182 295 200 255 218 220" style="animation-delay:0.2s"/>
      <path class="stem" d="M170 350 C150 300 128 270 108 245" style="animation-delay:0.25s"/>
      <path class="stem" d="M170 350 C190 300 212 270 232 245" style="animation-delay:0.25s"/>

      <!-- leaf sprays (drawn first, sit behind the blooms) -->
      <g transform="translate(108,250) scale(1.1) rotate(-25)" style="opacity:0;animation:fadeIn 0.7s ease forwards;animation-delay:0.4s"><use href="#leafSpray" width="40" height="40" x="-20" y="-20"/></g>
      <g transform="translate(232,250) scale(1.1) rotate(25)" style="opacity:0;animation:fadeIn 0.7s ease forwards;animation-delay:0.45s"><use href="#leafSpray" width="40" height="40" x="-20" y="-20"/></g>
      <g transform="translate(140,260) scale(0.9) rotate(-45)" style="opacity:0;animation:fadeIn 0.7s ease forwards;animation-delay:0.5s"><use href="#leafSpray" width="40" height="40" x="-20" y="-20"/></g>
      <g transform="translate(200,262) scale(0.9) rotate(45)" style="opacity:0;animation:fadeIn 0.7s ease forwards;animation-delay:0.55s"><use href="#leafSpray" width="40" height="40" x="-20" y="-20"/></g>
      <ellipse class="leaf" cx="140" cy="255" rx="15" ry="6.5" style="--rot:-35deg; animation-delay:0.55s; transform:rotate(-35deg)"/>
      <ellipse class="leaf" cx="200" cy="258" rx="15" ry="6.5" style="--rot:35deg; animation-delay:0.6s; transform:rotate(35deg)"/>
      <ellipse class="leaf" cx="168" cy="200" rx="14" ry="6" style="--rot:0deg; animation-delay:0.65s; transform:rotate(0deg)"/>

      <!-- filler sprigs (baby's breath) tucked between the roses for fullness -->
      <g transform="translate(82,175) scale(0.85)" style="opacity:0;animation:fadeIn 0.6s ease forwards;animation-delay:1.3s"><use href="#filler" width="32" height="32" x="-16" y="-16"/></g>
      <g transform="translate(256,175) scale(0.85) rotate(8)" style="opacity:0;animation:fadeIn 0.6s ease forwards;animation-delay:1.35s"><use href="#filler" width="32" height="32" x="-16" y="-16"/></g>
      <g transform="translate(155,118) scale(0.75) rotate(-10)" style="opacity:0;animation:fadeIn 0.6s ease forwards;animation-delay:1.6s"><use href="#filler" width="32" height="32" x="-16" y="-16"/></g>
      <g transform="translate(182,118) scale(0.75) rotate(10)" style="opacity:0;animation:fadeIn 0.6s ease forwards;animation-delay:1.65s"><use href="#filler" width="32" height="32" x="-16" y="-16"/></g>
      <g transform="translate(110,225) scale(0.7) rotate(-15)" style="opacity:0;animation:fadeIn 0.6s ease forwards;animation-delay:1.4s"><use href="#filler" width="32" height="32" x="-16" y="-16"/></g>
      <g transform="translate(228,225) scale(0.7) rotate(15)" style="opacity:0;animation:fadeIn 0.6s ease forwards;animation-delay:1.45s"><use href="#filler" width="32" height="32" x="-16" y="-16"/></g>

      <!-- back row roses: smaller, deeper colour, sit behind the main blooms -->
      <g transform="translate(85,150) scale(0.65) rotate(-12)">
        <g class="sway" style="animation-delay:2.6s">
          <g class="rose" style="animation-delay:1.6s" fill="url(#gWine)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(253,150) scale(0.65) rotate(12)">
        <g class="sway" style="animation-delay:2.65s">
          <g class="rose" style="animation-delay:1.65s" fill="url(#gWine)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(168,108) scale(0.7)">
        <g class="sway" style="animation-delay:2.7s">
          <g class="rose" style="animation-delay:1.7s" fill="url(#gBlush)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>

      <!-- roses (outer <g> holds fixed position/scale via attribute so the CSS
           animations on the inner groups never overwrite placement) -->
      <g transform="translate(100,195) scale(1.05)">
        <g class="sway" style="animation-delay:1.9s">
          <g class="rose" style="animation-delay:0.7s" fill="url(#gRose)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(238,195) scale(1.0)">
        <g class="sway" style="animation-delay:2.0s">
          <g class="rose" style="animation-delay:0.85s" fill="url(#gWine)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(122,220) scale(0.85)">
        <g class="sway" style="animation-delay:2.1s">
          <g class="rose" style="animation-delay:1.0s" fill="url(#gBlush)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(218,220) scale(0.85)">
        <g class="sway" style="animation-delay:2.2s">
          <g class="rose" style="animation-delay:1.1s" fill="url(#gRose)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(168,175) scale(1.25)">
        <g class="sway" style="animation-delay:2.3s">
          <g class="rose" style="animation-delay:1.25s" fill="url(#gWine)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(140,150) scale(0.8) rotate(-8)">
        <g class="sway" style="animation-delay:2.4s">
          <g class="rose" style="animation-delay:1.4s" fill="url(#gBlush)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(196,150) scale(0.8) rotate(8)">
        <g class="sway" style="animation-delay:2.5s">
          <g class="rose" style="animation-delay:1.5s" fill="url(#gRose)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(133,178) scale(0.7) rotate(-15)">
        <g class="sway" style="animation-delay:2.75s">
          <g class="rose" style="animation-delay:1.75s" fill="url(#gBlush)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>
      <g transform="translate(205,178) scale(0.7) rotate(15)">
        <g class="sway" style="animation-delay:2.8s">
          <g class="rose" style="animation-delay:1.8s" fill="url(#gWine)">
            <use href="#roseFlower" width="60" height="60" x="-30" y="-30"/>
          </g>
        </g>
      </g>

      <!-- wrapping paper -->
      <path d="M105 280 L170 350 L235 280 L260 300 L170 358 L80 300 Z" fill="#fffaf6" opacity="0.92" style="opacity:0;animation:fadeIn 0.8s ease forwards;animation-delay:1.9s"/>
      <path d="M105 280 L170 350 L235 280" fill="none" stroke="#f0ddd4" stroke-width="1.5" style="opacity:0;animation:fadeIn 0.8s ease forwards;animation-delay:2.0s"/>
      <!-- ribbon -->
      <path class="ribbon" d="M135 320 Q170 340 205 320" stroke="var(--gold)" stroke-width="6" fill="none" stroke-linecap="round" style="animation-delay:2.05s"/>
      <ellipse class="ribbon" cx="170" cy="318" rx="10" ry="7" fill="var(--gold)" style="animation-delay:2.1s"/>

      </g>
    </svg>

    <div class="petals-fall" id="petalsFall"></div>
    </div>

    <div class="caption">all the roses you deserve, babe</div>
    <button class="continue-btn" id="toNote">read the note &rarr;</button>
  </div>

  <div id="note-scene">
    <div class="paper">
      <p class="salutation">Babe,</p>
      <p class="note-line typed" data-text="I know you're still angry with me, and I know I hurt you. I'm truly sorry for that."></p>
      <p class="note-line typed" data-text="But I really want us to find our way back to each other."></p>
      <p class="note-line typed" data-text="I want us to be the way we were before, and even better than before."></p>
      <p class="note-line typed" data-text="I want us to love each other more, understand each other better, and grow through this together."></p>
      <p class="note-line typed" data-text="I want us to make more beautiful memories, laugh over the silliest things, go on more dates, annoy each other, and keep choosing each other every single day."></p>
      <p class="note-line typed" data-text="I don't want this fight to define us. I want it to be something that makes us stronger."></p>
      <p class="note-line typed" data-text="I love you so much, and I'll do my best to become someone who gives you peace instead of pressure."></p>
      <p class="signoff" id="signoffLine" style="opacity:0">yours, always</p>
    </div>
    <footer style="animation-delay:4.2s">made for Deeksha</footer>
    <div class="note-continue" style="animation-delay:4.6s">
      <button class="continue-btn" id="toFinal">tap here, babe &hearts;</button>
    </div>
  </div>

  <div id="final-scene">
    <svg class="final-heart" viewBox="0 0 32 29">
      <path d="M16 27S2 18 2 9.5C2 4.8 5.6 2 9.3 2 12 2 14.3 3.6 16 6 17.7 3.6 20 2 22.7 2 26.4 2 30 4.8 30 9.5 30 18 16 27 16 27Z" fill="var(--rose)"/>
    </svg>
    <p class="final-title">I love you, babe.</p>
    <p class="final-sub">Every word above is true. I'm here, I'm not giving up on us, and I'll keep showing up better every single day. Whenever you're ready to talk, I'm right here.</p>
    <button class="replay-btn" id="replayBtn">watch it again</button>
  </div>

</div>

<div class="floating-hearts" id="floatingHearts"></div>

<button id="music-toggle" aria-label="Toggle music">
  <svg viewBox="0 0 20 14">
    <rect class="bar" x="2" y="4" width="3" height="6" rx="1"/>
    <rect class="bar" x="8.5" y="1" width="3" height="12" rx="1"/>
    <rect class="bar" x="15" y="5" width="3" height="4" rx="1"/>
  </svg>
</button>

<script>
  const intro = document.getElementById('intro');
  const bouquetScene = document.getElementById('bouquet-scene');
  const noteScene = document.getElementById('note-scene');
  const toNote = document.getElementById('toNote');

  intro.addEventListener('click', () => {
    intro.classList.add('hide');
    setTimeout(() => {
      intro.style.display = 'none';
      bouquetScene.classList.add('show');
      spawnPetals();
    }, 600);
  });

  function spawnPetals(){
    const container = document.getElementById('petalsFall');
    const colors = ['#e8909e', '#d9707e', '#c44a5d', '#f3b9c2'];
    let count = 0;
    const interval = setInterval(() => {
      if (count >= 14) { clearInterval(interval); return; }
      count++;
      const p = document.createElement('div');
      p.className = 'petal-fall';
      p.style.left = (10 + Math.random() * 80) + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = p.style.height = (6 + Math.random() * 6) + 'px';
      p.style.animationDuration = (3 + Math.random() * 2) + 's';
      container.appendChild(p);
      setTimeout(() => p.remove(), 6000);
    }, 350);
  }

  toNote.addEventListener('click', () => {
    bouquetScene.style.display = 'none';
    noteScene.classList.add('show');
    typeNoteLines();
  });

  /* ---------- typewriter effect for the note ---------- */
  let typingStarted = false;
  function typeNoteLines(){
    if (typingStarted) return; // don't restart if she re-views without replay
    typingStarted = true;
    const lines = Array.from(document.querySelectorAll('.note-line.typed'));
    const signoff = document.getElementById('signoffLine');
    let lineIdx = 0;

    function typeLine(){
      if (lineIdx >= lines.length){
        signoff.style.opacity = '1';
        return;
      }
      const el = lines[lineIdx];
      const text = el.getAttribute('data-text');
      el.classList.add('typing');
      let charIdx = 0;
      const speed = 28;
      const tick = setInterval(() => {
        charIdx++;
        el.textContent = text.slice(0, charIdx);
        if (charIdx >= text.length){
          clearInterval(tick);
          el.classList.remove('typing');
          lineIdx++;
          setTimeout(typeLine, 420);
        }
      }, speed);
    }
    setTimeout(typeLine, 300);
  }

  function resetTyping(){
    typingStarted = false;
    document.querySelectorAll('.note-line.typed').forEach(el => {
      el.textContent = '';
      el.classList.remove('typing');
    });
    document.getElementById('signoffLine').style.opacity = '0';
  }

  /* ---------- tappable roses: sparkle + pulse on click ---------- */
  function wireRoseSparkles(){
    document.querySelectorAll('.rose').forEach(rose => {
      rose.addEventListener('click', (e) => {
        e.stopPropagation();
        const use = rose.querySelector('use');
        use.classList.remove('tap-pulse');
        // restart animation even on rapid re-taps
        void use.offsetWidth;
        use.classList.add('tap-pulse');

        for (let i = 0; i < 6; i++){
          const spark = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          const angle = Math.random() * Math.PI * 2;
          const dist = 14 + Math.random() * 14;
          spark.setAttribute('r', 1.4 + Math.random() * 1.4);
          spark.setAttribute('cx', 0);
          spark.setAttribute('cy', 0);
          spark.setAttribute('class', 'spark');
          spark.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px');
          spark.style.setProperty('--ty', (Math.sin(angle) * dist) + 'px');
          rose.appendChild(spark);
          requestAnimationFrame(() => spark.classList.add('show'));
          setTimeout(() => spark.remove(), 750);
        }
      });
    });
  }
  wireRoseSparkles();

  /* ---------- gentle generated ambient music (original, not a sampled song) ---------- */
  let audioCtx = null;
  let musicPlaying = false;
  let musicTimer = null;
  const musicBtn = document.getElementById('music-toggle');

  const notes = [392.0, 440.0, 523.25, 587.33, 659.25, 587.33, 523.25, 440.0]; // gentle G-major run
  let noteIndex = 0;

  function playNote(freq, time, dur){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(0.05, time + 0.4);
    gain.gain.linearRampToValueAtTime(0, time + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + dur + 0.1);
  }

  function scheduleLoop(){
    if (!musicPlaying) return;
    const now = audioCtx.currentTime;
    playNote(notes[noteIndex % notes.length], now, 1.8);
    playNote(notes[noteIndex % notes.length] / 2, now, 2.2);
    noteIndex++;
    musicTimer = setTimeout(scheduleLoop, 1500);
  }

  function startMusic(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    musicPlaying = true;
    musicBtn.classList.add('playing');
    scheduleLoop();
  }

  function stopMusic(){
    musicPlaying = false;
    clearTimeout(musicTimer);
    musicBtn.classList.remove('playing');
  }

  musicBtn.addEventListener('click', () => {
    if (musicPlaying) { stopMusic(); } else { startMusic(); }
  });

  // reveal music button + start music after the first user interaction (envelope tap)
  intro.addEventListener('click', () => {
    musicBtn.classList.add('visible');
    startMusic();
  }, { once: true });

  /* ---------- floating hearts ambience ---------- */
  function spawnFloatingHeart(){
    const container = document.getElementById('floatingHearts');
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.style.left = (Math.random() * 92) + '%';
    h.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    h.style.animationDuration = (6 + Math.random() * 4) + 's';
    const size = 12 + Math.random() * 14;
    h.innerHTML = '<svg width="' + size + '" height="' + (size * 0.9) + '" viewBox="0 0 32 29"><path d="M16 27S2 18 2 9.5C2 4.8 5.6 2 9.3 2 12 2 14.3 3.6 16 6 17.7 3.6 20 2 22.7 2 26.4 2 30 4.8 30 9.5 30 18 16 27 16 27Z" fill="#e7a0ac"/></svg>';
    container.appendChild(h);
    setTimeout(() => h.remove(), 11000);
  }
  setInterval(spawnFloatingHeart, 1400);

  /* ---------- final scene ---------- */
  const toFinal = document.getElementById('toFinal');
  const finalScene = document.getElementById('final-scene');
  const replayBtn = document.getElementById('replayBtn');

  toFinal.addEventListener('click', () => {
    noteScene.style.display = 'none';
    finalScene.classList.add('show');
  });

  replayBtn.addEventListener('click', () => {
    finalScene.classList.remove('show');
    noteScene.classList.remove('show');
    noteScene.style.display = '';
    bouquetScene.style.display = 'flex';
    document.getElementById('petalsFall').innerHTML = '';
    resetTyping();
    // restart the bloom animations by cloning the svg
    const svgEl = document.querySelector('.bouquet-svg');
    const fresh = svgEl.cloneNode(true);
    svgEl.replaceWith(fresh);
    wireRoseSparkles();
    spawnPetals();
  });
</script>

</body>
</html>
